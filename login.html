<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body style="margin:0; font-family:Arial; background:#f4f4f4;">

  <div style="width:300px; margin:120px auto; padding:30px; background:white; border-radius:10px; text-align:center;">
    
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username"><br><br>
    <input type="password" id="password" placeholder="Password"><br><br>

    <button onclick="login()">Daxil ol</button>

    <p id="result"></p>

  </div>

<script>
function login() {
  let u = document.getElementById("username").value;
  let p = document.getElementById("password").value;

  if(u === "admin" && p === "1234") {
    document.getElementById("result").innerText = "Giriş uğurludur";
  } else {
    document.getElementById("result").innerText = "Yanlış məlumat";
  }
}
</script>

</body>
</html>
